<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      background: #f4f4f2;
      padding: 2rem;
    }

    .card {
      display: flex;
      width: 100%;
      max-width: 820px;
      min-height: 520px;
      border-radius: 24px;
      overflow: hidden;
      border: 0.5px solid #e0e0d8;
      background: #fff;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      background: linear-gradient(145deg, #0C447C, #185FA5, #042C53);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .left-circle1 {
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }

    .left-circle2 {
      position: absolute;
      bottom: 60px; left: -80px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 1.5rem;
    }

    .left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 1rem;
    }

    .left p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      font-weight: 300;
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-top: 2rem;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }

    .dot.active {
      background: #fff;
      width: 20px;
      border-radius: 3px;
    }

    /* ── RIGHT PANEL ── */
    .right {
      flex: 1;
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #fff;
    }

    .right-head {
      margin-bottom: 2rem;
    }

    .right-head h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .right-head p {
      font-size: 14px;
      color: #888;
      font-weight: 300;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #f8f8f6;
      border: 0.5px solid #e0e0d8;
      border-radius: 10px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: #185FA5;
      background: #fff;
    }

    .row-opt {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 13px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #888;
      cursor: pointer;
    }

    .remember input[type=checkbox] {
      accent-color: #185FA5;
      width: 14px; height: 14px;
    }

    .forgot {
      color: #185FA5;
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
    }

    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #0C447C;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 1.2rem;
    }

    .btn-login:hover { background: #185FA5; }
    .btn-login:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .divider span {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }

    .divider hr {
      flex: 1;
      border: none;
      border-top: 0.5px solid #e0e0d8;
    }

    .btn-google {
      width: 100%;
      padding: 11px;
      background: #fff;
      border: 0.5px solid #ccc;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .btn-google:hover { background: #f8f8f6; }

    .signup {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: #888;
    }

    .signup a {
      color: #185FA5;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .signup a:hover { text-decoration: underline; }

    .msg {
      display: none;
      margin-top: 0.8rem;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
    }

    .msg.success {
      display: block;
      background: #eaf3de;
      color: #3B6D11;
      border: 0.5px solid #97C459;
    }

    .msg.error {
      display: block;
      background: #fcebeb;
      color: #A32D2D;
      border: 0.5px solid #F09595;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .card { flex-direction: column; min-height: unset; }
      .left { padding: 2rem; }
      .left h1 { font-size: 24px; }
      .right { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- LEFT PANEL -->
    <div class="left">
      <div class="left-circle1"></div>
      <div class="left-circle2"></div>
      <p class="brand">Selamat datang</p>
      <h1>Masuk ke akun Anda</h1>
      <p>Akses semua fitur dan layanan eksklusif yang telah kami siapkan untuk Anda.</p>
      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
      <div class="right-head">
        <h2>Login</h2>
        <p>Silakan masukkan email dan kata sandi Anda</p>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="nama@email.com" />
      </div>

      <div class="field">
        <label>Kata Sandi</label>
        <input type="password" id="password" placeholder="Masukkan kata sandi" />
      </div>

      <div class="row-opt">
        <label class="remember">
          <input type="checkbox" /> Ingat saya
        </label>
        <a class="forgot" href="#">Lupa kata sandi?</a>
      </div>

      <button class="btn-login" onclick="doLogin()">Masuk</button>

      <div class="divider">
        <hr /><span>atau lanjutkan dengan</span><hr />
      </div>

      <button class="btn-google" onclick="googleLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Lanjutkan dengan Google
      </button>

      <div id="msg" class="msg"></div>

      <p class="signup">Belum punya akun? <a href="#">Daftar sekarang</a></p>
    </div>

  </div>

  <script>
    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      msg.className = 'msg';

      if (!email || !pass) {
        msg.textContent = 'Harap isi email dan kata sandi terlebih dahulu.';
        msg.className = 'msg error';
        return;
      }

      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(email)) {
        msg.textContent = 'Format email tidak valid.';
        msg.className = 'msg error';
        return;
      }

      msg.textContent = 'Login berhasil! Selamat datang kembali.';
      msg.className = 'msg success';
    }

    function googleLogin() {
      const msg = document.getElementById('msg');
      msg.textContent = 'Mengarahkan ke Google Sign-In...';
      msg.className = 'msg success';
    }
  </script>

</body>
</html>
